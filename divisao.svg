<svg viewBox="0 0 1500 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="400" fill="#000845" />

  <g font-family="serif" font-style="italic" fill="white">
    <text x="150" y="120" font-size="50" opacity="0">
      (jω)⁴ + 2
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.2s" fill="freeze" />
    </text>

    <path d="M 400 70 L 400 160 L 1100 160" stroke="white" stroke-width="4" fill="none" stroke-dasharray="1000" stroke-dashoffset="1000">
      <animate attributeName="stroke-dashoffset" from="1000" to="0" dur="0.8s" begin="1s" fill="freeze" />
    </path>

    <text x="420" y="120" font-size="50" opacity="0">
      (jω)⁴ - 4(jω)³ - (jω)² + 4(jω)
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.8s" fill="freeze" />
    </text>

    <text x="420" y="220" font-size="58" opacity="0" >
      1
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.6s" fill="freeze" />
    </text>

    <text x="100" y="300" font-size="50" opacity="0">
      -(jω)⁴ + 4(jω)³ + (jω)² - 4(jω) + 2
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.4s" fill="freeze" />
    </text>

    <g stroke="#ff4a4a" stroke-width="5">
      <line x1="155" y1="125" x2="235" y2="95" stroke-dasharray="100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.4s" begin="4.2s" fill="freeze" />
      </line>
      <line x1="110" y1="305" x2="190" y2="275" stroke-dasharray="100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.4s" begin="4.2s" fill="freeze" />
      </line>
    </g>
  </g>
</svg>

